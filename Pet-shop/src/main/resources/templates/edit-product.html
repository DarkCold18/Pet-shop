<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" xintegrity="sha512-z3gLpd7yknf1YoNbCzqN7z0t9e/QJ9Xz4vA24tY2l3y3c5/j6t5V/E/wA5R/K1a4uP5P7lT9V5qF3P5B6/5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1>Редагування продукту</h1>
    <div class="col-8 cen-add" th:each="product : ${product}">
        <form class="my-form" th:action="'/shop/product/'+${ id }+'/edit'" method="post" enctype="multipart/form-data">
            <label>Введіть назву</label>
            <input type="text" name="name" class="form-control" th:value="${product.name}">
            <label>Введіть ціну товару</label>
            <input type="text" name="price" class="form-control" th:value="${product.price}">
            <label>Оберіть категорію</label>
            <select class="form-control" id="categoryId" name="categoryId">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
            <label>Вибери фото</label>
            <div th:if="${product.image != null and product.image != ''}">
                <img th:src="'/images/'+${product.image}" alt="Катег" width="70%">
            </div>
            <div th:unless="${product.image != null and product.image != ''}">
                <img src="/images/noimage.png" alt="Катег" width="70%">
            </div>
            <input type="file" name="image" class="form-control" accept="image/png, image/jpeg, image/gif, image/jpg">

            <br><label>Введіть короткий опис</label>
            <textarea name="short_description" class="form-control" th:text="${product.short_description}"></textarea>
            <label>Введіть повний опис</label>
            <textarea name="full_description" class="form-control" th:text="${product.full_description}"></textarea>
            <input type="submit" value="Зберегти" class="form-control btn btn-add">
        </form>
    </div>


    <div class="col-4" th:insert="layouts/sidebar :: sidebar">
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
