<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагувати товар | Bento POS</title>
    <!-- Підключення шрифтів та іконок -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="~{layouts/header :: header}"></div>
<main class="form-main-container">
    <div class="page-header">
        <a href="/inventory" class="btn-back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="page-title">Редагування товару</h1>
    </div>
    <div class="form-card">
        <!-- Форма редагування -->
        <form th:action="@{/shop/product/{id}/edit(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data" class="form-grid">
            <input type="hidden" th:field="*{image}" />
            <div class="form-group md-col-span-2">
                <label class="form-label">Назва товару</label>
                <input type="text" th:field="*{name}" required class="input-field">
            </div>
            <div class="form-group">
                <label class="form-label">Категорія</label>
                <select name="categoryId" class="input-field">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == product.category.id}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Нове фото (залишіть пустим, щоб не змінювати)</label>
                <div class="file-upload-box">
                    <input type="file" name="imageFile" class="file-upload-input" accept="image/*">
                    <i class="fas fa-image file-upload-icon"></i>
                    <span class="file-upload-text">Обрати нове фото...</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Ціна (₴)</label>
                <input type="number" step="0.01" th:field="*{price}" required class="input-field">
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Бренд</label>
                <input type="text" class="form-control" name="brand" th:value="${product?.brand}" placeholder="Наприклад: Royal Canin">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Країна реєстрації</label>
                <input type="text" class="form-control" name="registrationCountry" th:value="${product?.registrationCountry}" placeholder="Наприклад: Франція">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Країна-виробник</label>
                <input type="text" class="form-control" name="manufacturerCountry" th:value="${product?.manufacturerCountry}" placeholder="Наприклад: Польща">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Гарантія</label>
                <input type="text" class="form-control" name="guarantee" th:value="${product?.guarantee}" placeholder="Наприклад: 14 днів">
            </div>
            <div class="form-group">
                <label class="form-label">Залишок на складі</label>
                <div class="quantity-adjust-container">
                    <input type="number" th:field="*{quantity}" id="bento-qty-input" required class="input-field">
                    <button type="button" class="btn-quick-adjust" onclick="adjustQuantityFieldValue(5)">+5</button>
                    <button type="button" class="btn-quick-adjust" onclick="adjustQuantityFieldValue(20)">+20</button>
                </div>
            </div>
            <div class="md-col-span-2 form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-double"></i> ЗБЕРЕГТИ ЗМІНИ
                </button>
            </div>
        </form>
    </div>
</main>
<footer th:insert="~{layouts/footer :: footer}"></footer>
<script>
    <!-- Скрипт для оновлення кількості -->
    function adjustQuantityFieldValue(amount) {
        const qtyInput = document.getElementById('bento-qty-input');
        if (qtyInput) {
            // Отримуємо поточне значення (якщо пусте - беремо 0)
            let currentVal = parseInt(qtyInput.value) || 0;
            // Додаємо значення та оновлюємо інпут
            qtyInput.value = currentVal + amount;
        }
    }
</script>
</body>
</html>
