<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header"></div>
<div class="row ">
    <h1>Редагування продукту</h1>
    <div class="col-8 cen-add" th:object="${product}"> <form class.="my-form" th:action="'/shop/product/'+ *{id} +'/edit'" method="post" enctype="multipart/form-data">
        <label>Введіть назву</label>
        <input type="text" name="name" class="form-control" th:value="*{name}">
        <label>Введіть ціну товару</label>
        <input type="text" name="price" class="form-control" th:value="*{price}">
        <label>Оберіть категорію</label>
        <select class="form-control" id="categoryId" name="categoryId">
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${category.id == product.category.id}">
            </option>
        </select>
        <label>Головне фото</label>
        <div th:if="*{image != null and image != ''}">
            <img th:src="'/images/'+ *{image}" alt="Катег" width="70%">
        </div>
        <input type="file" name="image" class="form-control" accept="image/png, image/jpeg, image/gif, image/jpg">
        <label>Додаткові фото (можна обрати декілька)</label>
        <input type="file" name="images" class="form-control" accept="image/png, image/jpeg, image/gif, image/jpg" multiple>
        <br>
        <label>Доступні розміри (через кому)</label>
        <input type="text" name="sizes" class="form-control" placeholder="Напр: 2XS,Small,Medium"
               th:value="*{availableSizes != null ? #strings.listJoin(availableSizes, ',') : ''}">
        <br>
        <label>Введіть короткий опис</label>
        <textarea name="short_description" class="form-control" th:text="*{short_description}"></textarea>
        <label>Введіть повний опис</label>
        <textarea name="full_description" class="form-control" th:text="*{full_description}"></textarea>

        <input type="submit" value="Зберегти" class="form-control btn btn-add">
    </form>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar"></div>
</div>
<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
