<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row container ">
    <h1 th:text="${ title }"></h1>
    <div class="col-8">
        <table class="table" id="cartTable">
            <thead>
            <tr>
                <th>Назва</th>
                <th>Кількість</th>
                <th>Ціна</th>
                <th>Дія</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart}" th:data-price="${item.product.price}">
                <td th:text="${item.product.name}"></td>
                <td>
                    <div >
                        <button class="btn btn-outline-secondary lef" onclick="updateQty(this,+1)">+</button>
                        <input type="number" class="form-control text-center qly kol lef" th:value="${item.quality}">
                        <button class="btn btn-outline-secondary" onclick="updateQty(this,-1)">-</button>
                    </div>
                </td>
                <td>
                    <div class="price-cell total" th:text="${item.product.price * item.quality} + ' Грн'"></div>
                </td>
                <td>
                    <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                        <button class="btn btn-danger btn-sm">Видалити</button>
                    </form>
                </td>

            </tr>
            </tbody>
            <tfoot>
            <tr>
                <td colspan="3" class="text-end"><strong>Загальна сума:</strong></td>
                <td colspan="2" id="originalTotal" th:data-bonus="${user.bonusPoints}">
                    <span id="priceBeforeDiscount">0.00 грн</span>
                </td>
            </tr>
            </tfoot>
        </table>
        <form action="/clear" method="post">
            <button class="btn btn-danger btn-sm">Очистити</button>
        </form>
        <form th:action="@{/checkout}" method="post">
            <div class="bonus-section">
                <label>
                    <input type="checkbox" name="useBonus" id="useBonus"
                           th:if="${user != null}" th:checked="${user.bonusPoints > 0}">
                    <span th:if="${user != null}">
    Використати бонус (є <span th:text="${user.bonusPoints}"></span> балів)
  </span>
                    <span th:unless="${user != null}">
    Ввійдіть, щоб використати бонуси
  </span>
                </label>
            </div>
            <button type="submit" class="btn btn-add">Оформити замовлення</button>
        </form>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">
</footer>
<script>
    function updateQty(btn, delta) {
        const row = btn.closest('tr');
        const qtyInput = row.querySelector('.qly');
        let qty = parseInt(qtyInput.value) + delta;
        if (qty < 1) qty = 1;
        qtyInput.value = qty;

        const price = parseFloat(row.dataset.price);
        const totalCell = row.querySelector('.total');
        const itemTotal = qty * price;
        totalCell.textContent = itemTotal.toFixed(2) + ' Грн';

        updateTotalWithBonus();
    }

    function updateTotalWithBonus() {
        const bonus = parseFloat(document.getElementById("originalTotal").dataset.bonus || 0);
        const useBonus = document.getElementById("useBonus")?.checked ?? false;
        let currentTotal = 0;
        document.querySelectorAll('#cartTable tbody tr').forEach(row => {
            const qtyInput = row.querySelector('.qly');
            const price = parseFloat(row.dataset.price);
            const quantity = parseInt(qtyInput.value) || 0;
            currentTotal += price * quantity;
        });

        const priceBefore = document.getElementById("priceBeforeDiscount");
        const bonusText = document.getElementById("bonusUsed");
        const finalPrice = document.getElementById("finalPrice");

        if (priceBefore) priceBefore.textContent = currentTotal.toFixed(2) + " Грн.";

        let discounted = currentTotal;
        if (useBonus && bonus > 0) {
            const discount = Math.min(bonus, currentTotal);
            discounted = currentTotal - discount;

            if (bonusText) {
                bonusText.style.display = "inline";
                bonusText.textContent = "- " + discount.toFixed(2) + " Грн. ";
            }
        } else {
            if (bonusText) {
                bonusText.style.display = "none";
                bonusText.textContent = "";
            }
        }

        if (finalPrice) finalPrice.textContent = discounted.toFixed(2) + " Грн.";
    }

    document.addEventListener("DOMContentLoaded", function () {
        const useBonusCheckbox = document.getElementById('useBonus');
        if (useBonusCheckbox) {
            useBonusCheckbox.addEventListener('change', updateTotalWithBonus);
        }

        updateTotalWithBonus();
    });

</script>

</body>
</html>
