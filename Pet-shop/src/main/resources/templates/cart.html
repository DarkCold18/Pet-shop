<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Кошик | Зоомагазин'">Кошик</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="cart-container">

    <h1 class="cart-header">
        Мій Кошик
        <span class="cart-count-badge" th:text="${cart != null ? cart.size() : 0}">0</span>
    </h1>

    <div th:if="${cart == null or cart.isEmpty()}" class="empty-cart-card">
        <div class="empty-cart-icon">
            <i class="fas fa-shopping-basket"></i>
        </div>
        <h2 class="empty-cart-title">Ваш кошик порожній</h2>
        <p class="empty-cart-text">Здається, ви ще нічого не додали. Погляньте на наші новинки!</p>
        <a href="/shop" class="btn-primary-large">
            Перейти до покупок
        </a>
    </div>

    <div th:unless="${cart == null or cart.isEmpty()}" class="cart-layout">

        <div class="cart-items-column">

            <div class="cart-clear-wrap">
                <form th:action="@{/cart/clear}" method="post">
                    <button class="btn-clear-cart">
                        <i class="fas fa-trash"></i> Очистити кошик
                    </button>
                </form>
            </div>

            <div th:each="item : ${cart}"
                 th:if="${item != null and item.product != null}"
                 class="cart-item cart-item-card"
                 th:data-product-id="${item.product.id}"
                 th:data-price="${item.product.price}">

                <div class="cart-item-img-wrap">
                    <img th:src="@{'/images/' + ${item.product.image}}" alt="Product">
                </div>

                <div class="cart-item-details">
                    <h3 class="cart-item-title" th:text="${item.product.name}">Назва товару</h3>
                    <p class="cart-item-stock">На складі: <span th:text="${item.product.quantity}"></span> шт.</p>

                    <div class="qty-controls">
                        <button type="button" th:data-id="${item.product.id}" onclick="updateQuantity(this.dataset.id, -1)" class="qty-btn">
                            <i class="fas fa-minus"></i>
                        </button>
                        <input type="text" th:value="${item.quality}" readonly class="qty-input">
                        <button type="button" th:data-id="${item.product.id}" onclick="updateQuantity(this.dataset.id, 1)" class="qty-btn">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="cart-item-actions">
                    <div class="item-total-price">
                        <span class="total" th:text="${item.product.price * item.quality}">0</span> ₴
                    </div>
                    <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post">
                        <button type="submit" class="btn-remove-item">
                            <i class="far fa-trash-alt"></i> Видалити
                        </button>
                    </form>
                </div>
            </div>

        </div>

        <div class="cart-summary-column">
            <div class="cart-summary-card">
                <h3 class="cart-summary-title">Підсумок</h3>

                <form th:action="@{/checkout}" method="post" id="checkoutForm">

                    <div class="cart-summary-row">
                        <span>Проміжний підсумок</span>
                        <span id="subtotalDisplay" class="cart-summary-val-bold" th:data-bonus="${user?.bonusPoints}" th:text="${total != null ? total + ' ₴' : '0.00 ₴'}">0.00 ₴</span>
                    </div>

                    <div class="cart-summary-row">
                        <span>Доставка</span>
                        <span class="cart-summary-badge">Безкоштовно</span>
                    </div>

                    <div class="cart-summary-row" id="discountLine" style="display:none; color: var(--bento-accent);">
                        <span style="font-weight: 700;">Знижка (бонуси)</span>
                        <span id="discountDisplay" style="font-weight: 700;">-0.00 ₴</span>
                    </div>

                    <div th:if="${user != null}" class="cart-bonus-box">
                        <label class="cart-bonus-label">
                            <span>Використати <span th:text="${user.bonusPoints}"></span> балів</span>
                            <input type="checkbox" name="useBonus" id="useBonus" value="true" class="cart-bonus-checkbox">
                        </label>
                    </div>

                    <div style="height: 1px; background-color: var(--bento-border); margin: 0.5rem 0;"></div>

                    <div class="cart-grand-total-row">
                        <span class="cart-grand-total-label">Разом</span>
                        <span id="grandTotalDisplay" class="cart-grand-total-val" th:text="${total != null ? total + ' ₴' : '0.00 ₴'}">0.00 ₴</span>
                    </div>

                    <button type="submit" class="btn-checkout">
                        Оформити замовлення
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <p class="cart-secure-note">
                    <i class="fas fa-lock"></i> Безпечна оплата та захист даних
                </p>
            </div>
        </div>

    </div>
</main>

<footer th:insert="~{layouts/footer :: footer}"></footer>

<script>
    function updateCartTotals() {
        let currentSubtotal = 0;
        document.querySelectorAll('.cart-item').forEach(itemRow => {
            const totalCell = itemRow.querySelector('.item-total-price .total');
            currentSubtotal += parseFloat(totalCell.textContent) || 0;
        });

        const subtotalDisplay = document.getElementById("subtotalDisplay");
        const grandTotalDisplay = document.getElementById("grandTotalDisplay");
        const discountLine = document.getElementById("discountLine");
        const discountDisplay = document.getElementById("discountDisplay");
        const useBonusCheckbox = document.getElementById("useBonus");

        if (subtotalDisplay) subtotalDisplay.textContent = currentSubtotal.toFixed(2) + " ₴";

        let finalTotal = currentSubtotal;
        let bonusDiscount = 0;
        const bonus = parseFloat(subtotalDisplay?.dataset.bonus || 0);
        const useBonus = useBonusCheckbox?.checked ?? false;

        if (useBonus && bonus > 0) {
            bonusDiscount = Math.min(bonus, currentSubtotal);
            finalTotal = currentSubtotal - bonusDiscount;
            if (discountLine && discountDisplay) {
                discountLine.style.display = "flex";
                discountDisplay.textContent = "-" + bonusDiscount.toFixed(2) + " ₴";
            }
        } else {
            if (discountLine) {
                discountLine.style.display = "none";
            }
        }
        if (grandTotalDisplay) {
            grandTotalDisplay.textContent = finalTotal.toFixed(2) + " ₴";
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const useBonusCheckbox = document.getElementById('useBonus');
        if (useBonusCheckbox) {
            useBonusCheckbox.addEventListener('change', updateCartTotals);
        }
        updateCartTotals();
    });

    function updateQuantity(productId, delta) {
        const itemRow = document.querySelector(`.cart-item[data-product-id="${productId}"]`);

        if (!itemRow) {
            console.error("Елемент кошика не знайдено для ID:", productId);
            return;
        }

        const qtyInput = itemRow.querySelector('.qty-input');
        let currentQuantity = parseInt(qtyInput.value);
        let newQuantity = currentQuantity + delta;

        if (newQuantity < 1) {
            return;
        }

        fetch('/cart/update', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `id=${productId}&delta=${delta}`
        })
            .then(response => {
                if (!response.ok) {
                    alert('Помилка сервера при оновленні кошика.');
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    qtyInput.value = data.newQuantity;

                    const itemTotalElement = itemRow.querySelector('.item-total-price .total');
                    if (itemTotalElement) {
                        itemTotalElement.textContent = data.itemTotal.toFixed(2);
                    }
                    updateCartTotals();
                } else if (data.error) {
                    alert("Помилка: " + data.error);
                }
            })
            .catch(error => {
                console.error('Помилка AJAX-запиту:', error);
            });
    }
</script>
</body>
</html>
