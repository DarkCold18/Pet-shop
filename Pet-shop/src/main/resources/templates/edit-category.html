<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагувати категорію | Bento POS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="form-page-container">

    <div th:each="category : ${category}">

        <div class="form-header">
            <a href="/inventory" class="btn-back-circle" title="Назад до складу">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="form-title">Редагування: <span th:text="${category.name}" style="color: var(--bento-accent);">Назва</span></h1>
        </div>

        <div class="form-card">
            <form th:action="'/shop/update-category/'+ ${category.id}" method="post" enctype="multipart/form-data" class="custom-form">

                <div class="form-group">
                    <label class="bento-label">Назва категорії</label>
                    <input type="text" name="name" class="bento-input" th:value="${category.name}" required>
                </div>

                <div class="form-group">
                    <label class="bento-label">Опис</label>
                    <textarea name="description" class="bento-input" th:text="${category.description}" rows="3" style="resize: none;"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: auto 1fr; gap: 1.5rem; align-items: start;">
                    <!-- Прев'ю поточного фото -->
                    <div class="form-group">
                        <label class="bento-label">Поточне фото</label>
                        <div style="width: 120px; height: 120px; background: var(--bento-bg); border-radius: 1rem; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--bento-border); padding: 0.5rem;">
                            <img th:if="${category.image != null and category.image != ''}" th:src="'/images/'+${category.image}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                            <img th:unless="${category.image != null and category.image != ''}" src="/images/noimage.png" style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0.3;">
                        </div>
                    </div>

                    <!-- Завантаження нового -->
                    <div class="form-group">
                        <label class="bento-label">Нове зображення (залишіть пустим, щоб не змінювати)</label>
                        <div class="file-upload-box">
                            <input type="file" name="image" class="file-upload-input" accept="image/png, image/jpeg, image/gif, image/jpg">
                            <i class="fas fa-image file-upload-icon"></i>
                            <span class="file-upload-text">Обрати новий файл...</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit-form" style="margin-top: 1rem;">
                    <i class="fas fa-save"></i> ЗБЕРЕГТИ ЗМІНИ
                </button>

            </form>
        </div>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}" style="margin-top: auto;"></footer>

</body>
</html>
