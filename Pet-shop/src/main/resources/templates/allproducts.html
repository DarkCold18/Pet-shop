<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1 th:text="#{ allproduct }"></h1>
    <div>
        <form>

        </form>
        <a href="/shop/product/add" class="btn btn-add"> Додати продукти</a>
    </div>
    <div class="col-8">
        <div class="wrapper">
        <div class="col-3 lef cat card1" th:each="product : ${products}">
            <a th:href="'/shop/product/'+${ product.id }" >
            <h2 th:text="${product.name}" class="cen"></h2>
            </a>
            <a th:href="'/shop/product/'+${ product.id }" >
            <div th:if="${product.image != null and product.image != ''}" class="cen">
                <img th:src="'/images/'+${product.image}" alt="Катег" width="70%" height="100px">
            </div>
            </a>
            <a th:href="'/shop/product/'+${ product.id }" >
            <div th:unless="${product.image != null and product.image != ''}" class="cen">
                <img src="/images/noimage.png" alt="Катег" width="70%" height="100px">
            </div>
            </a>
            <div th:text="'Ціна: ' + ${product.price} + ' грн'" class="price"></div>
            <br>
            <div th:text="${product.short_description}" class="desc">
            </div>
            <div class="card-buttons">
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                <input type="hidden" name="quality" value="1">
                <button class="btn btn-info lef ">Купити</button>
            </form>
            <a th:href="'/shop/product/'+${ product.id }" class="btn btn-info lef ">Перегляд</a>
            </div>
        </div>
        </div>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
