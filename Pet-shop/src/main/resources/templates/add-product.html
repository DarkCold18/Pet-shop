<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1>Додавання продукту</h1>
    <div class="col-8 cen-add">
        <form class="my-form" action="/shop/product/add" method="post" enctype="multipart/form-data">
            <label>Введіть назву</label>
            <input type="text" name="name" class="form-control" placeholder="Введи назву">
            <label>Введіть ціну товару</label>
            <input type="text" name="price" class="form-control" placeholder="1000">
            <label>Оберіть категорію</label>
            <select class="form-control" id="categoryId" name="categoryId">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
            <input type="file" name="image" class="form-control" accept="image/png, image/jpeg, image/gif, image/jpg">
            <label>Вибери фото</label>
            <label>Введіть короткий опис</label>
            <textarea name="short_description" class="form-control"></textarea>
            <label>Введіть повний опис</label>
            <textarea name="full_description" class="form-control"></textarea>
            <input type="submit" value="Додати" class="form-control btn btn-add">
        </form>

    </div>


    <div class="col-4" th:insert="layouts/sidebar :: sidebar">
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
