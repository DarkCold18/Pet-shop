<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }">Додати продукт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-admin-form">
<div th:insert="layouts/header :: header"></div>
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="col-lg-8 col-md-10">
        <div class="admin-form-panel">
            <h1 class="form-title">Додавання продукту</h1>
            <form action="/shop/product/add" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Назва товару</label>
                    <input type="text" name="name" class="form-control" placeholder="Введіть назву" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Ціна (грн)</label>
                        <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Категорія</label>
                        <select class="form-control" id="categoryId" name="categoryId">
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Доступні розміри (через кому)</label>
                    <input type="text" name="sizes" class="form-control" placeholder="Напр: Small, Medium, Large">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Головне зображення</label>
                    <label for="mainImage" class="file-upload-box">
                        <i class="fas fa-camera-retro file-upload-icon"></i>
                        <span class="d-block mt-2 text-muted">Натисніть, щоб завантажити</span>
                        <input type="file" name="image" id="mainImage" accept="image/png, image/jpeg, image/gif, image/jpg" required>
                    </label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Додаткові фото (Галерея)</label>
                    <input type="file" name="images" class="form-control" accept="image/png, image/jpeg, image/gif, image/jpg" multiple>
                </div>
                <div class="mb-3">
                    <label class="form-label">Короткий опис</label>
                    <textarea name="short_description" class="form-control" rows="2" placeholder="Кілька слів про товар..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label">Повний опис</label>
                    <textarea name="full_description" class="form-control" rows="4" placeholder="Детальна інформація..."></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-submit-category">Додати товар</button>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
