<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати товар | Bento POS</title>
    <!-- Підключення шрифтів та іконок -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="~{layouts/header :: header}"></div>
<main class="form-main-container">
    <div class="page-header">
        <a href="/inventory" class="btn-back">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="page-title">Новий товар</h1>
    </div>
    <div class="form-card">
        <!-- Форма додавання -->
        <form th:action="@{/shop/product/add}" th:object="${product}" method="post" enctype="multipart/form-data" class="form-grid">
            <div class="form-group md-col-span-2">
                <label class="form-label">Назва товару</label>
                <input type="text" th:field="*{name}" required placeholder="Наприклад: Корм Brit Care" class="input-field">
            </div>
            <div class="form-group">
                <label class="form-label">Категорія</label>
                <select th:field="*{category}" required class="input-field">
                    <option value="" disabled selected>Оберіть категорію...</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Фото товару</label>
                <div class="file-upload-box">
                    <input type="file" name="file" class="file-upload-input" accept="image/*">
                    <i class="fas fa-cloud-upload-alt file-upload-icon"></i>
                    <span class="file-upload-text">Завантажити файл...</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Ціна (₴)</label>
                <input type="number" step="0.01" th:field="*{price}" required placeholder="0.00" class="input-field">
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Бренд</label>
                <input type="text" class="form-control" name="brand" th:value="${product?.brand}" placeholder="Наприклад: Royal Canin">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Країна реєстрації</label>
                <input type="text" class="form-control" name="registrationCountry" th:value="${product?.registrationCountry}" placeholder="Наприклад: Франція">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Країна-виробник</label>
                <input type="text" class="form-control" name="manufacturerCountry" th:value="${product?.manufacturerCountry}" placeholder="Наприклад: Польща">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 600; color: #475569;">Гарантія</label>
                <input type="text" class="form-control" name="guarantee" th:value="${product?.guarantee}" placeholder="Наприклад: 14 днів">
            </div>
            <div class="form-group">
                <label class="form-label">Кількість на складі</label>
                <input type="number" th:field="*{quantity}" required placeholder="0" class="input-field">
            </div>
            <div class="md-col-span-2 form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus"></i> ДОДАТИ ТОВАР
                </button>
            </div>
        </form>
    </div>
</main>
    <div th:insert="layouts/footer :: footer"></div>
</body>
</html>
