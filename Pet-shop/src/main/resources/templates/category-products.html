<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }">Товари категорії</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="layouts/header :: header"></div>

<div class="container my-5">
    <div class="row">

        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h2 class="section-title fw-bold">
                    <span class="text-muted fs-5">Категорія:</span>
                    <span th:text="${category}" class="text-dark">Назва</span>
                </h2>

            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4" th:each="product : ${products}">
                    <div class="shop-card h-100">

                        <a th:href="'/shop/product/'+${ product.id }" class="shop-card-img-link">
                            <div class="shop-card-image-wrapper">
                                <img th:if="${product.image != null and product.image != ''}"
                                     th:src="'/images/'+${product.image}"
                                     alt="Product Image">
                                <img th:unless="${product.image != null and product.image != ''}"
                                     src="/images/noimage.png"
                                     alt="No Image">
                            </div>
                        </a>

                        <div class="shop-card-body d-flex flex-column">
                            <a th:href="'/shop/product/'+${ product.id }" class="text-decoration-none">
                                <h5 class="shop-card-title text-dark" th:text="${product.name}">Назва</h5>
                            </a>

                            <div class="mt-auto">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="shop-card-price text-success" th:text="${product.price} + ' грн'">0 грн</span>
                                </div>

                                <div class="shop-card-actions row g-2">
                                    <div class="col-6">
                                        <a th:href="'/shop/product/'+${ product.id }" class="btn btn-outline-secondary btn-sm w-100">
                                            <i class="far fa-eye"></i> Огляд
                                        </a>
                                    </div>
                                    <div class="col-6">
                                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                            <input type="hidden" name="quantity" value="1">
                                            <button type="submit" class="btn btn-primary btn-sm w-100">
                                                <i class="fas fa-cart-plus"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <div th:if="${products.isEmpty()}" class="alert alert-info mt-4 text-center">
            <i class="fas fa-box-open fa-2x mb-3 d-block"></i>
            У цій категорії поки що немає товарів.
            <br>
            <a href="/shop" class="btn btn-link mt-2">Переглянути всі категорії</a>
        </div>
        </div>

        <div class="col-lg-4 mt-4 mt-lg-0">
            <div th:insert="layouts/sidebar :: sidebar"></div>
        </div>

    </div>
</div>

<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
