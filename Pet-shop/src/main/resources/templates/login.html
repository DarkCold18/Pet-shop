<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login.title} + ' | Pawfect'">Авторизація</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="form-page-container" style="max-width: 28rem; padding: 2rem 1rem;">

    <div class="form-card" style="padding: 2.5rem 2rem;">

        <h1 class="form-title" style="text-align: center; margin-bottom: 1.5rem; font-size: 1.75rem;" th:text="#{auth.login.title}">Авторизація</h1>

        <div class="auth-toggle-box">
            <a href="/login" class="auth-toggle-btn active" th:text="#{auth.login.tab}">Вхід</a>
            <a href="/register" class="auth-toggle-btn" th:text="#{auth.register.tab}">Реєстрація</a>
        </div>

        <div th:if="${param.error}" style="background-color: #fef2f2; color: #ef4444; padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; font-weight: 600; font-size: 0.85rem; text-align: center;" th:text="#{auth.login.error}">
            Невірний логін або пароль. Спробуйте ще раз.
        </div>

        <div th:if="${param.logout}" style="background-color: #f0fdf4; color: #16a34a; padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; font-weight: 600; font-size: 0.85rem; text-align: center;" th:text="#{auth.login.logout_msg}">
            Ви успішно вийшли з системи.
        </div>

        <form th:action="@{/login}" method="post" class="custom-form" style="gap: 1.25rem;">

            <div class="form-group">
                <label class="bento-label" th:text="#{auth.login.username.label}">Логін (Ім'я користувача)</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user input-icon-left"></i>
                    <input type="text" name="username" required th:placeholder="#{auth.login.username.placeholder}" class="bento-input with-icon-left">
                </div>
            </div>

            <div class="form-group">
                <label class="bento-label" th:text="#{auth.login.password.label}">Пароль</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon-left"></i>
                    <input type="password" name="password" id="login-password" required placeholder="••••••••" class="bento-input with-icon-left with-icon-right">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('login-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="auth-options-row">
                <label class="auth-checkbox-label">
                    <input type="checkbox" name="remember-me"> <span th:text="#{auth.login.remember}">Запам'ятати мене</span>
                </label>
                <a href="#" class="auth-forgot-link" th:text="#{auth.login.forgot}">Забули пароль?</a>
            </div>

            <button type="submit" class="btn-submit-form" style="margin-top: 0.5rem;" th:text="#{auth.login.btn}">
                УВІЙТИ
            </button>

        </form>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}" style="margin-top: auto;"></footer>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
