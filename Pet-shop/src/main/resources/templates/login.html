<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Вхід</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1>Вхід</h1>
    <div class="col-2 login-form">
        <form th:action="@{/login}" method="post">
            <label>Логін</label>
            <input type="text" name="username" class="login-form" required>
            <label>Пароль</label>
            <input type="password" name="password" class="login-form" required>
            <button type="submit" class="btn btn-primary">Увійти</button>
            <p th:if="${error}" class="text-danger mt-2" th:text="${error}"></p>
            <p class="mt-2"> Немає аккаунту? <a th:href="@{/register}">Реєстрація</a></p>
        </form>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
