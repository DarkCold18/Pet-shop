<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{checkout.page.title} + ' | Pawfect'">Оформлення замовлення</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="~{layouts/header :: header}"></div>

<main class="checkout-container">

    <div th:if="${message == null}">

        <div class="checkout-header">
            <h1 class="checkout-title" th:text="#{checkout.header.title}">Оформлення замовлення</h1>
            <p class="checkout-subtitle" th:text="#{checkout.header.subtitle}">Будь ласка, заповніть дані для доставки</p>
        </div>

        <form id="payment-form" th:action="@{/checkout/process}" method="post" class="checkout-layout">

            <div class="checkout-form-column">

                <div class="checkout-card">
                    <h3 class="checkout-card-title">
                        <span class="step-number step-blue">1</span>
                        <span th:text="#{checkout.step1.title}">Контактні дані</span>
                    </h3>

                    <div class="checkout-grid-2">
                        <div class="checkout-field-wrapper">
                            <label class="checkout-label" th:text="#{checkout.label.name}">ПІБ</label>
                            <input type="text" name="name" required placeholder="John Doe" class="checkout-input">
                        </div>
                        <div class="checkout-field-wrapper">
                            <label class="checkout-label" th:text="#{checkout.label.phone}">Телефон</label>
                            <input type="tel" name="phone" required placeholder="+380..." class="checkout-input">
                        </div>
                    </div>

                    <div class="checkout-field-wrapper" style="margin-top: 1.5rem;">
                        <label class="checkout-label" th:text="#{checkout.label.email}">Email</label>
                        <input type="email" name="email" required placeholder="example@gmail.com" class="checkout-input">
                    </div>
                </div>

                <div class="checkout-card">
                    <h3 class="checkout-card-title">
                        <span class="step-number step-green">2</span>
                        <span th:text="#{checkout.step2.title}">Адреса доставки</span>
                    </h3>
                    <div class="checkout-field-wrapper">
                        <label class="checkout-label" th:text="#{checkout.label.address}">Місто та відділення / Адреса</label>
                        <textarea name="address" required rows="3" class="checkout-input checkout-textarea"></textarea>
                    </div>
                </div>

                <div class="checkout-card">
                    <h3 class="checkout-card-title">
                        <span class="step-number step-peach">3</span>
                        <span th:text="#{checkout.step3.title}">Спосіб оплати</span>
                    </h3>
                    <div class="checkout-grid-2">

                        <label class="payment-option-label">
                            <input type="radio" name="paymentMethod" value="card" checked>
                            <div class="payment-icon-wrapper">
                                <i class="fas fa-credit-card"></i>
                            </div>
                            <span class="payment-text" th:text="#{checkout.pay.card}">Карткою онлайн</span>
                            <i class="fas fa-check-circle payment-check-icon"></i>
                        </label>

                        <label class="payment-option-label">
                            <input type="radio" name="paymentMethod" value="cod">
                            <div class="payment-icon-wrapper">
                                <i class="fas fa-money-bill-wave"></i>
                            </div>
                            <span class="payment-text" th:text="#{checkout.pay.cod}">При отриманні</span>
                            <i class="fas fa-check-circle payment-check-icon"></i>
                        </label>

                    </div>
                    <div id="stripe-card-container" style="margin-top: 1.5rem;">
                        <label class="checkout-label" th:text="#{checkout.label.card_data}">Дані картки</label>
                        <div id="card-element" style="padding: 14px 15px; border: 1px solid #E2E8F0; border-radius: 12px; background: #fff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);"></div>

                        <div id="card-errors" role="alert" style="color: #EF4444; margin-top: 8px; font-size: 0.85rem; font-weight: 500;"></div>
                    </div>
                </div>
            </div>

            <div class="checkout-summary-column">
                <div class="summary-card">
                    <h3 class="summary-title" th:text="#{checkout.summary.title}">Ваше замовлення</h3>

                    <div class="summary-items-list">
                        <div th:each="item : ${cartItems}" class="summary-item">
                            <div class="summary-item-left">
                                <div class="summary-item-img">
                                    <img th:src="@{'/images/' + ${item.product.image}}" alt="Product">
                                </div>
                                <span class="summary-item-name" th:text="${item.product.name}">Назва Товару</span>
                            </div>
                            <span class="summary-item-price" th:text="${item.quality} + ' × ' + ${item.product.price} + (${#locale.language == 'en'} ? ' UAH' : ' ₴')">0 ₴</span>
                        </div>
                    </div>

                    <div class="summary-divider"></div>

                    <div class="summary-total-row">
                        <span class="summary-total-label" th:text="#{checkout.summary.total}">До сплати</span>
                        <span class="summary-total-val" th:text="${cartTotal} + (${#locale.language == 'en'} ? ' UAH' : ' ₴')">0 ₴</span>
                    </div>

                    <input type="hidden" name="amount" th:value="${cartTotal}">

                    <button type="submit" class="btn-submit-order">
                        <span th:text="#{checkout.btn.submit}">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</span>
                        <i class="fas fa-check-double"></i>
                    </button>

                    <p class="summary-terms" th:text="#{checkout.terms}">
                        Натискаючи кнопку, ви погоджуєтесь з умовами.
                    </p>
                </div>
            </div>

        </form>
    </div>

    <div th:if="${message != null}" class="success-container">
        <div class="success-card">

            <div class="success-icon-wrap">
                <i class="fas fa-check"></i>
            </div>

            <h1 class="success-title" th:text="#{checkout.success.title}">Успішно оформлено!</h1>

            <p class="success-message" th:text="${message}">Повідомлення</p>

            <div class="success-actions">
                <a th:href="@{/shop}" class="btn-success-primary">
                    <i class="fas fa-shopping-bag"></i> <span th:text="#{checkout.btn.continue}">ПРОДОВЖИТИ ПОКУПКИ</span>
                </a>

                <a th:href="@{/orders}" class="btn-success-secondary">
                    <i class="fas fa-history"></i> <span th:text="#{checkout.btn.orders}">Мої замовлення</span>
                </a>
            </div>

        </div>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}"></footer>
<script>
    // 1. ІНІЦІАЛІЗАЦІЯ STRIPE (Вставте свій Publishable Key)
    const stripe = Stripe('pk_test_51TbeExABzC4adpNWalCP6PcaSlkgfewYM6pfDaWwktCGNX6zTIgYoAGZ1Dne06F07zhOllmw5xcaCREUgfgvPdxy007ozXIPIx');
    const elements = stripe.elements();

    const style = {
        base: {
            color: '#1E293B',
            fontFamily: '"Inter", sans-serif',
            fontSmoothing: 'antialiased',
            fontSize: '16px',
            '::placeholder': { color: '#94A3B8' }
        },
        invalid: {
            color: '#EF4444',
            iconColor: '#EF4444'
        }
    };

    const card = elements.create('card', {style: style, hidePostalCode: true});

    // Перевірка наявності контейнера перед маунтом (щоб не ламалось на Success Page)
    if(document.getElementById('card-element')) {
        card.mount('#card-element');
    }

    card.on('change', function(event) {
        const displayError = document.getElementById('card-errors');
        if (event.error) {
            displayError.textContent = event.error.message;
        } else {
            displayError.textContent = '';
        }
    });

    const paymentRadios = document.querySelectorAll('input[name="paymentMethod"]');
    const stripeContainer = document.getElementById('stripe-card-container');

    paymentRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'card') {
                stripeContainer.style.display = 'block';
            } else {
                stripeContainer.style.display = 'none';
            }
        });
    });

    const form = document.getElementById('payment-form');
    const submitBtn = document.querySelector('.btn-submit-order');

    if(form) {
        form.addEventListener('submit', async function(event) {
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

            if (paymentMethod === 'cod') {
                return true;
            }

            event.preventDefault();
            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            const amountVal = document.querySelector('input[name="amount"]').value;

            try {
                const response = await fetch('/create-payment-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amountVal })
                });
                const data = await response.json();

                const result = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: card,
                        billing_details: {
                            name: document.querySelector('input[name="name"]').value,
                            email: document.querySelector('input[name="email"]').value,
                            phone: document.querySelector('input[name="phone"]').value
                        }
                    }
                });

                if (result.error) {
                    document.getElementById('card-errors').textContent = result.error.message;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                } else {
                    if (result.paymentIntent.status === 'succeeded') {
                        const stripeInput = document.createElement('input');
                        stripeInput.setAttribute('type', 'hidden');
                        stripeInput.setAttribute('name', 'stripePaymentId');
                        stripeInput.setAttribute('value', result.paymentIntent.id);
                        form.appendChild(stripeInput);
                        form.submit();
                    }
                }
            } catch (error) {
                document.getElementById('card-errors').textContent = "Server connection error.";
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });
    }
</script>
</body>
</html>
