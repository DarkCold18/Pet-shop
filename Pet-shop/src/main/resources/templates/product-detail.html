<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header"></div>

<div class="container my-5">
    <div class="row">
        <div class="col-lg-12">
            <div class="pd-wrapper" th:if="${product != null}" th:object="${product}">
                <div class="row">

                    <div class="col-md-7">
                        <div class="main-image-wrapper mb-3">
                            <img th:src="'/images/' + *{image}" alt="Main product image" id="mainProductImage" class="img-fluid">
                        </div>
                        <div class="thumbnail-gallery" th:if="*{images != null and !images.isEmpty()}">
                            <img th:src="'/images/' + *{image}" alt="Thumbnail 1" class="thumb-active"
                                 th:data-imagesrc="'/images/' + *{image}"
                                 th:onclick="changeImage(this)">
                            <img th:each="img : *{images}" th:src="'/images/' + ${img}" alt="Thumbnail"
                                 th:data-imagesrc="'/images/' + ${img}"
                                 th:onclick="changeImage(this)">
                        </div>
                    </div>

                    <div class="col-md-5">

                        <p class="pd-subtitle" th:text="*{short_description}">
                            Короткий опис
                        </p>

                        <h1 class="pd-title" th:text="*{name}">Назва Товару</h1>

                        <div class="col-12 mt-4">
                            <h3 class="pd-section-header">Повний опис товару</h3>
                            <p th:text="*{full_description}" class="pd-description-text"></p>
                        </div>

                        <div th:if="*{availableSizes != null and !availableSizes.isEmpty()}" class="my-3">
                            <div class="pd-option-label">Розмір</div>
                            <div class="pd-size-options d-flex flex-wrap gap-2">
                                <button th:each="size : *{availableSizes}"
                                        class="pd-size-btn"
                                        th:text="${size}">
                                    Size
                                </button>
                            </div>
                        </div>

                        <form th:action="@{/cart/add/{id}(id=*{id})}" method="post" class="pd-buy-form mt-4">

                            <div class="pd-buy-group">
                                <div class="pd-quantity">
                                    <label for="quantity" class="form-label mb-1">Кількість:</label>
                                    <input type="number" name="quantity" id="quantity" value="1" min="1" class="form-control pd-quantity-input">
                                </div>
                                <div class="pd-price">
                                    <div class="pd-price-amount" th:text="*{price} + ' грн'">399.99 грн</div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg pd-buy-btn w-100">
                                <i class="fas fa-shopping-cart"></i> Додати в кошик
                            </button>
                        </form>

                        <div class="pd-admin-box mt-4" th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
                            <h5><i class="fas fa-shield-alt"></i> Панель Адміна</h5>
                            <div class="pd-admin-btns">
                                <a th:href="'/shop/product/'+ *{id} + '/edit'" class="btn btn-outline-secondary btn-sm">
                                    <i class="fas fa-pencil-alt"></i> Редагувати
                                </a>
                                <form th:action="'/shop/product/'+ *{id} + '/delete'" method="post">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Ви впевнені, що хочете видалити цей товар?');">
                                        <i class="fas fa-trash-alt"></i> Видалити
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function changeImage(thumbnailElement) {
        var newImageSrc = thumbnailElement.getAttribute('data-imagesrc');
        document.getElementById('mainProductImage').src = newImageSrc;
        var thumbnails = document.querySelectorAll('.thumbnail-gallery img');
        thumbnails.forEach(function(thumb) {
            thumb.classList.remove('thumb-active');
        });
        thumbnailElement.classList.add('thumb-active');
    }
</script>
</body>
</html>
