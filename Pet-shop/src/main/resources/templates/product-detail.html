<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" xintegrity="sha512-z3gLpd7yknf1YoNbCzqN7z0t9e/QJ9Xz4vA24tY2l3y3c5/j6t5V/E/wA5R/K1a4uP5P7lT9V5qF3P5B6/5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header"></div>
<div class="container my-5">
    <div class="row">
        <div class="col-lg-12"> <div class="product-detail-container" th:if="${product != null}" th:object="${product}">
            <div class="row">
                <div class="col-md-7"> <div class="main-image-wrapper mb-3">
                    <img th:src="'/images/' + *{image}" alt="Main product image" id="mainProductImage" class="img-fluid">
                </div>
                    <div class="thumbnail-gallery" th:if="*{images != null and !images.isEmpty()}">
                        <img th:src="'/images/' + *{image}" alt="Thumbnail 1" class="thumb-active"
                             th:onclick="|changeImage(this, '/images/' + *{image})|">
                        <img th:each="img : *{images}" th:src="'/images/' + ${img}" alt="Thumbnail"
                             th:onclick="|changeImage(this, '/images/' + ${img})|">
                    </div>
                </div>
                <div class="col-md-5"> <h1 class="product-title" th:text="*{name}">Назва Товару</h1>
                    <p class="product-short-desc" th:text="*{short_description}">
                        Короткий опис.
                    </p>
                    <div class="col-12">
                        <h3 class="border-bottom pb-2">Повний опис товару</h3>
                        <p th:text="*{full_description}" class="product-full-desc"></p>
                    </div>
                    <form th:action="@{/cart/add/{id}(id=*{id})}" method="post" class="buy-form">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="quantity-section">
                                <label for="quantity" class="form-label mb-1">Кількість:</label>
                                <input type="number" name="quantity" id="quantity" value="1" min="1" class="form-control quantity-input">
                            </div>
                            <div class="price-section">
                                <div class="product-price" th:text="*{price} + ' грн'">399.99 грн</div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-buy w-100">
                            <i class="fas fa-shopping-cart"></i> Додати в кошик
                        </button>
                    </form>
                    <div class="admin-actions mt-4" th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
                        <h5><i class="fas fa-shield-alt"></i> Панель Адміна</h5>
                        <div class="admin-buttons">
                            <a th:href="'/shop/product/'+ *{id} + '/edit'" class="btn btn-outline-secondary btn-sm">
                                <i class="fas fa-pencil-alt"></i> Редагувати
                            </a>
                            <form th:action="'/shop/product/'+ *{id} + '/delete'" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Ви впевнені, що хочете видалити цей товар?');">
                                    <i class="fas fa-trash-alt"></i> Видалити
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div> <div class="row mt-5">
        </div>
        </div>
        </div>
    </div>
</div>
<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function changeImage(thumbnailElement, newImageSrc) {
        document.getElementById('mainProductImage').src = newImageSrc;
        var thumbnails = document.querySelectorAll('.thumbnail-gallery img');
        thumbnails.forEach(function(thumb) {
            thumb.classList.remove('thumb-active');
        });
        thumbnailElement.classList.add('thumb-active');
    }
</script>
</body>
</html>
