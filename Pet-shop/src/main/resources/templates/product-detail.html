<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1>Детально про товар</h1>
    <div>
        <form action="">
        </form>

    </div>
    <div class="col-8 ">
        <div class="col-8 lef cat-detail" th:each="product : ${product}">
            <h2 th:text="${product.name}"></h2>
            <div th:if="${product.image != null and product.image != ''}">
                <img th:src="'/images/'+${product.image}" alt="Катег" width="70%">
            </div>
            <div th:unless="${product.image != null and product.image != ''}">
                <img src="/images/noimage.png" alt="Катег" width="70%">
            </div>
            <div th:text="'Ціна: ' + ${product.price} + ' грн'" class="price"></div>
            <br>
            <div th:text="${product.full_description }" class="desc">
            </div>
            <div class="card-buttons">
            <a th:href="'/shop/product/'+${ product.id } + '/edit'" class="btn btn-add">Редагувати</a>
            <a th:href="'/shop/product/'+${ product.id } + '/delete'" class="btn btn-info lef">Видалити</a>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <button class="btn btn-info lef ">Купити</button>
                </form>
            </div>
        </div>

    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
