<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Мої замовлення'} + ' | Pawfect'"></title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background-color: #F8FAFC; display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="orders-page-container" style="flex: 1;">

    <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-history" style="font-size: 2rem; color: #FF8B3D;"></i>
        <h1 style="margin: 0; font-size: 2rem; font-weight: 800; color: #1E293B;">Історія покупок</h1>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}" class="empty-orders-card">
        <i class="fas fa-box-open"></i>
        <h2 style="font-weight: 800; color: #1E293B; margin-bottom: 10px;">Тут поки порожньо</h2>
        <p style="color: #64748B; margin-bottom: 25px;">Ви ще не здійснили жодного замовлення. Час порадувати свого улюбленця!</p>
        <a href="/shop" class="btn-primary" style="display: inline-block; text-decoration: none;">Перейти до магазину</a>
    </div>

    <div th:unless="${orders == null or orders.isEmpty()}" class="orders-grid">

        <div th:each="order : ${orders}" class="user-order-card">

            <div class="user-order-header">
                <div>
                    <div class="user-order-id">
                        <i class="fas fa-receipt" style="color: #94A3B8;"></i>
                        <span th:text="'#ORD-' + ${order.id}">#ORD-0</span>
                    </div>
                    <div class="user-order-date" th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm') : 'Дата невідома'}">29.09.2025</div>
                </div>

                <div>
                    <span th:if="${order.stripePaymentId != null}" style="background: #E0F2FE; color: #0284C7; padding: 6px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: 700;">
                        <i class="fas fa-check-circle" style="margin-right: 4px;"></i> Оплачено онлайн
                    </span>
                    <span th:unless="${order.stripePaymentId != null}" style="background: #FEF3C7; color: #D97706; padding: 6px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: 700;">
                        <i class="fas fa-wallet" style="margin-right: 4px;"></i> При отриманні
                    </span>
                </div>
            </div>

            <div class="user-order-body">
                <div th:each="item : ${order.items}" class="user-order-item">
                    <div>
                        <div class="user-order-item-name" th:text="${item.product.name}">Назва продукту</div>
                        <div class="user-order-item-meta">
                            <span th:text="${#numbers.formatDecimal(item.product.price, 1, 'COMMA', 2, 'POINT')} + ' ₴'">0.00 ₴</span>
                            × <span th:text="${item.quality}">1</span> шт.
                        </div>
                    </div>

                    <div class="user-order-item-price" th:text="${#numbers.formatDecimal(item.product.price * item.quality, 1, 'COMMA', 2, 'POINT')} + ' ₴'">
                        0.00 ₴
                    </div>
                </div>
            </div>

            <div class="user-order-footer">
                <span class="user-order-total-label">Загальна сума:</span>
                <span class="user-order-total-val" th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')} + ' ₴'">1500.00 ₴</span>
            </div>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<footer th:insert="~{layouts/footer :: footer}" style="margin-top: auto;"></footer>

</body>
</html>
