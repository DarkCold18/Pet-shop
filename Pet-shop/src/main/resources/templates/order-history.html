<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" xintegrity="sha512-z3gLpd7yknf1YoNbCzqN7z0t9e/QJ9Xz4vA24tY2l3y3c5/j6t5V/E/wA5R/K1a4uP5P7lT9V5qF3P5B6/5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .main-page-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: bolder;
            color: cadetblue;
        }
        .order-list-row {
            padding: 0 15px;
            --bs-gutter-x: 30px;
            --bs-gutter-y: 30px;
        }
        .order-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid cadetblue;
        }
        .order-header h4 {
            font-weight: bolder;
            color: #333;
            font-size: 1.2em;
            margin: 0;
            display: flex;
            align-items: center;
        }
        .order-header h4 i {
            margin-right: 8px;
            color: cadetblue;
        }
        .order-header span {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        .table-order-items {
            margin-bottom: 0;
            flex-grow: 1;
        }
        .table-order-items thead th {
            background-color: #f5f5f5;
            color: #555;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 10px;
            text-align: left;
        }
        .table-order-items tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid #f2f2f2;
            vertical-align: middle;
            color: #444;
            font-size: 0.95em;
        }
        .table-order-items tbody tr:last-child td {
            border-bottom: none;
        }

        .table-order-items th:nth-child(2),
        .table-order-items td:nth-child(2) {
            text-align: center;
        }
        .table-order-items th:nth-child(3),
        .table-order-items td:nth-child(3),
        .table-order-items th:nth-child(4),
        .table-order-items td:nth-child(4) {
            text-align: right;
        }

        .order-footer {
            background-color: rgba(173, 216, 230, 0.2);
            border-radius: 0 0 12px 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px -20px -20px -20px;
            border-top: 1px solid #e0e0e0;
        }
        .order-footer strong {
            font-size: 1.1em;
            color: #333;
            font-weight: 700;
        }
        .order-total-price {
            font-size: 1.4em;
            font-weight: 800;
            color: #f68b01;
        }

        .no-orders-message {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 50px 30px;
            text-align: center;
            margin-top: 30px;
            color: #555;
            border: 1px solid #e0e0e0;
        }
        .no-orders-message .btn-primary {
            background-color: cadetblue;
            border-color: cadetblue;
        }
    </style>
</head>
<body>
<div th:insert="layouts/header :: header"></div>

<div class="container my-5">
    <div class="row">
        <div class="col-12">
            <h1 th:text="${ title }" class="main-page-title">Історія покупок</h1>
        </div>

        <div class="col-12">
            <div th:if="${#lists.isEmpty(orders)}" class="no-orders-message">
                <p class="fs-4">Ви ще не здійснили жодного замовлення. Час це виправити!</p>
                <a href="/" class="btn btn-primary">Перейти до магазину</a>
            </div>

            <div th:unless="${#lists.isEmpty(orders)}" class="row order-list-row">
                <div class="col-12 col-md-6" th:each="order : ${orders}">
                    <div class="order-card">

                        <div class="order-header">
                            <h4><i class="fas fa-box-open"></i> Замовлення #<span th:text="${order.id}">12345</span></h4>
                            <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">29.09.2025 18:30</span>
                        </div>

                        <table class="table table-borderless table-order-items">
                            <thead>
                            <tr>
                                <th style="width: 45%;">Товар</th>
                                <th style="width: 15%;">К-сть</th>
                                <th style="width: 20%;" class="text-end">Ціна за шт.</th>
                                <th style="width: 20%;" class="text-end">Сума</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td>
                                    <div style="font-weight: 500;" th:text="${item.product.name}">Назва продукту</div>
                                </td>
                                <td class="text-center" th:text="${item.quality}">2</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')} + ' грн'">300.00 грн</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(item.price * item.quality, 1, 'COMMA', 2, 'POINT')} + ' грн'">600.00 грн</td>
                            </tr>
                            </tbody>
                        </table>

                        <div class="order-footer">
                            <strong>Загальна сума:</strong>
                            <span class="order-total-price" th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')} + ' грн'">1500.00 грн</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer"></footer>
</body>
</html>
