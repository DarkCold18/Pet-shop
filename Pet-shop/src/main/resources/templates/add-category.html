<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати категорію | Bento POS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="form-page-container">

    <div class="form-header">
        <a href="/inventory" class="btn-back-circle">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="form-title">Нова категорія</h1>
    </div>

    <div class="form-card">
        <form th:action="@{/shop/add-category}" method="post" enctype="multipart/form-data" class="custom-form">

            <div class="form-group">
                <label class="bento-label">Назва категорії</label>
                <input type="text" name="name" required placeholder="Наприклад: Сухий корм" class="bento-input">
            </div>

            <div class="form-group">
                <label class="bento-label">Опис</label>
                <textarea name="description" required placeholder="Додайте опис категорії..." rows="3" style="resize: none;" class="bento-input"></textarea>
            </div>

            <div class="form-group">
                <label class="bento-label">Зображення</label>
                <input type="file" name="image" required accept="image/*" class="bento-input">
            </div>

            <button type="submit" class="btn-submit-form">
                <i class="fas fa-save"></i> ЗБЕРЕГТИ КАТЕГОРІЮ
            </button>

        </form>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}"></footer>

</body>
</html>
