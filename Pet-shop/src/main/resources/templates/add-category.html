<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-admin-form">
<div th:insert="layouts/header :: header"></div>
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="col-lg-6 col-md-8">
        <div class="admin-form-panel">
            <h1 class="form-title">Додавання категорії</h1>
            <form action="/shop/add-category" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="categoryName" class="form-label">Введіть назву</label>
                    <input type="text" name="name" class="form-control" id="categoryName" placeholder="Введи назву" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Зображення категорії</label>
                    <label for="categoryImage" class="file-upload-box">
                        <i class="fas fa-camera-retro file-upload-icon"></i>
                         <input type="file" name="image" id="categoryImage" accept="image/png, image/jpeg, image/gif, image/jpg" required>
                    </label>
                </div>
                <div class="mb-3">
                    <label for="categoryDesc" class="form-label">Введіть опис</label>
                    <textarea name="description" class="form-control" id="categoryDesc" rows="3"></textarea>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-submit-category">Додати</button>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:insert="layouts/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
