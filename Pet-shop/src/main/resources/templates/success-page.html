<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успішна | Зоомагазин</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem;">

    <div class="success-container">
        <div class="success-card" style="text-align: center;">

            <div class="success-icon-wrap" style="margin: 0 auto 2rem;">
                <i class="fas fa-check"></i>
            </div>

            <h1 class="success-title">Оплата пройшла успішно! 🎉</h1>

            <p class="success-message">Дякуємо за покупку. Кошти зараховано, і ми вже почали збирати ваше замовлення для вашого улюбленця.</p>

            <div class="success-actions" style="justify-content: center; margin-top: 2rem;">
                <a th:href="@{/shop}" class="btn-success-primary">
                    <i class="fas fa-shopping-bag"></i> Продовжити покупки
                </a>

                <a th:href="@{/orders}" class="btn-success-secondary">
                    <i class="fas fa-history"></i> Мої замовлення
                </a>
            </div>

        </div>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}" style="margin-top: auto;"></footer>

</body>
</html>
