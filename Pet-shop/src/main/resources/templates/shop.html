<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1 th:text="#{ shop }"></h1>
    <div>
        <form>

        </form>
        <a th:href="@{/shop/add-category}" class="btn btn-add"> Додати</a>
    </div>
    <div class="col-8">
        <div class="row wrapper">
        <div class="col-3 lef cat card1 " th:each="category : ${categories}">
            <a th:href="'/shop/category/'+${ category.id }" >
            <h2 th:text="${category.name}" class="cen"></h2>
            </a>
            <a th:href="'/shop/category/'+${ category.id }" >
            <div th:if="${category.image != null and category.image != ''}" class="cen">
                <img th:src="'/images/'+${category.image}" alt="Катег" width="70%" height="100px">
            </div>
            </a>
            <a th:href="'/shop/category/'+${ category.id }" >
            <div th:unless="${category.image != null and category.image != ''}" class="cen">
                <img src="/images/noimage.png" alt="Катег" width="70%" height="100px">
            </div>
            </a>
            <div th:text="${category.description}" class="desc">
            </div>
            <div class="card-buttons">
            <a th:href="'/shop/'+${ category.id }" class="btn btn-add ">Товари</a>
            <a th:href="'/shop/category/'+${ category.id }" class="btn btn-info lef ">Перегляд</a>
            </div>
        </div>
        </div>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
