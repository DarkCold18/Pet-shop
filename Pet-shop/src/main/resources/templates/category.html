<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі категорії | Bento POS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<div th:insert="~{layouts/header :: header}"></div>

<main class="form-page-container" style="max-width: 48rem;">

    <div th:each="category : ${category}">

        <div class="form-header">
            <a href="/inventory" class="btn-back-circle" title="Назад до складу">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="form-title">Деталі категорії</h1>
        </div>

        <div class="form-card" style="display: flex; flex-direction: column; align-items: center; text-align: center;">

            <!-- Зображення -->
            <div style="width: 200px; height: 200px; background: var(--bento-bg); border-radius: 2rem; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--bento-border); margin-bottom: 1.5rem; padding: 1rem;">
                <img th:if="${category.image != null and category.image != ''}" th:src="'/images/'+${category.image}" style="max-width: 100%; max-height: 100%; object-fit: contain;" alt="Категорія">
                <img th:unless="${category.image != null and category.image != ''}" src="/images/noimage.png" style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0.3;" alt="Немає фото">
            </div>

            <!-- Текст -->
            <h2 th:text="${category.name}" style="font-size: 2.25rem; font-weight: 900; color: var(--bento-text); margin-bottom: 0.75rem;">Назва</h2>
            <p th:text="${category.description}" style="color: var(--gray-600); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem; max-width: 90%;"></p>

            <!-- Кнопки дій -->
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%; border-top: 1px solid var(--bento-border); padding-top: 2rem;">

                <a th:href="'/shop/'+${ category.id }" class="btn-submit-form" style="margin: 0; width: auto; padding: 1rem 2rem;">
                    <i class="fas fa-box-open"></i> Переглянути товари
                </a>

                <a th:href="'/shop/category/'+${ category.id } + '/edit'" class="btn-success-secondary" style="margin: 0;">
                    <i class="fas fa-pen"></i> Редагувати
                </a>

                <!-- Кнопка видалення (з використанням червоного стилю з квізу) -->
                <a th:href="'/shop/category/'+${ category.id } + '/delete'" class="btn-quiz-reset" style="margin: 0; display: inline-flex; align-items: center; gap: 0.5rem;" onclick="return confirm('Ви впевнені, що хочете видалити цю категорію?');">
                    <i class="fas fa-trash-alt"></i> Видалити
                </a>

            </div>

        </div>
    </div>

</main>

<footer th:insert="~{layouts/footer :: footer}" style="margin-top: auto;"></footer>

</body>
</html>
