<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <h1 th:text="#{ Category }"></h1>
    <div>
        <form>

        </form>
        <a th:href="@{/shop/add-category}" class="btn btn-add"> Додати</a>
    </div>
    <div class="col-8">
        <div class="col-8 lef cat-detail" th:each="category : ${category}">
            <h2 th:text="${category.name}"></h2>
            <div th:if="${category.image != null and category.image != ''}">
                <img th:src="'/images/'+${category.image}" alt="Катег" width="70%">
            </div>
            <div th:unless="${category.image != null and category.image != ''}">
                <img src="/images/noimage.png" alt="Катег" width="70%">
            </div>
            <div th:text="${category.description}" class="">
            </div>
            <div class="card-buttons">
            <a th:href="'/shop/category/'+${ category.id } + '/edit'" class="btn btn-add">Редагувати</a>
            <a th:href="'/shop/category/'+${ category.id } + '/delete'" class="btn btn-info lef">Видалити</a>
            <a th:href="'/shop/'+${ category.id }" class="btn btn-add ">Товари</a>
            </div>
        </div>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
