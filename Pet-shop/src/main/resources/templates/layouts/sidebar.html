<div th:fragment="sidebar" class="sidebar-modern">
  <h4 class="sidebar-title" th:text="#{ sidebar }">Категорії товарів</h4>

  <nav class="sidebar-nav">
    <a th:each="category : ${ categs }"
       th:href="@{'/shop/category/' + ${category.id}}">

      <i class="fa-solid fa-tag sidebar-icon"></i>

      <span th:text="${category.name}">Назва категорії</span>
    </a>
  </nav>
</div>
