<div th:fragment="header">
    <header class="modern-header">
        <div class="container-fluid header-container">

            <div class="header-left">
                <a th:href="@{/}" class="header-logo">
                    <img th:src="@{/images/logo12-fon.png}" alt="PawCo" onerror="this.src='/images/logo12.png'">
                </a>


            </div>

            <div class="d-flex align-items-center flex-grow-1 catalog-search-wrapper">

                <div class="dropdown me-3">
                    <button class="btn btn-catalog dropdown-toggle d-flex align-items-center gap-2 shadow-sm"
                            type="button"
                            id="catalogDropdown"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <i class="fas fa-bars"></i>
                        <span th:text="#{Category}">Каталог</span>
                    </button>

                    <ul class="dropdown-menu custom-dropdown" aria-labelledby="catalogDropdown">
                        <li>
                            <a class="dropdown-item" th:href="@{/shop/18}">
                                <i class="fas fa-cat"></i> Товари для котів
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/shop/19}">
                                <i class="fas fa-dog"></i> Товари для собак
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/shop/15}">
                                <i class="fas fa-bone"></i> Аксесуари та догляд
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="header-search w-100">
                    <form class="search-form" action="/search" method="get">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="form-control" th:placeholder="#{search_placeholder}" name="keyword">
                    </form>
                </div>
            </div>

            <div class="header-actions">

                <div class="lang-switcher">
                    <a href="?lang=uk"
                       class="lang-btn"
                       th:classappend="${#locale.language == 'uk' or #locale.language == 'ua'} ? 'active' : ''">
                        UA
                    </a>

                    <a href="?lang=en"
                       class="lang-btn"
                       th:classappend="${#locale.language == 'en'} ? 'active' : ''">
                        EN
                    </a>
                </div>

                <a th:href="@{/cart}" class="action-btn cart-btn" title="Кошик">
                    <i class="fas fa-shopping-cart"></i>
                </a>

                <div class="dropdown profile-dropdown">
                    <a href="#" class="action-btn" data-bs-toggle="dropdown" aria-expanded="false" title="Профіль">
                        <i class="far fa-user"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end custom-dropdown">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i class="fas fa-user-circle"></i> Мій профіль</a></li>
                        <li><a class="dropdown-item" th:href="@{/orders}"><i class="fas fa-box"></i> Історія покупок</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/login?logout}"><i class="fas fa-sign-out-alt"></i> Вийти</a></li>
                    </ul>
                </div>

                <div class="dropdown d-lg-none">
                    <button class="action-btn mobile-toggle" data-bs-toggle="dropdown">
                        <i class="fas fa-bars"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end custom-dropdown">
                        <li><a class="dropdown-item" th:href="@{/}"><i class="fas fa-home"></i> Головна</a></li>
                        <li><a class="dropdown-item" th:href="@{/shop}"><i class="fas fa-store"></i> Магазин</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/about}"><i class="fas fa-info-circle"></i> Про нас</a></li>
                        <li><a class="dropdown-item" th:href="@{/contact}"><i class="fas fa-envelope"></i> Контакти</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </header>
</div>
