<div th:fragment="header">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <header id="app-header">
        <div class="header-left-group">
            <a href="/" class="logo">
                <div class="logo-icon">🐾</div>
                <span>Pawfect</span>
            </a>
            <a href="/shop" class="header-shop-link-btn">
                <i class="fas fa-shopping-cart"></i> Магазин
            </a>
            <form action="/shop" method="get" class="header-search-container" id="header-search-box">
                <span class="header-search-icon"><i class="fas fa-search"></i></span>
                <input type="text" name="query" id="header-search-input" placeholder="Пошук товарів...">
                <button type="submit" class="header-search-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
        <div class="header-right-group">
            <div class="lang-switcher-capsule">
                <a href="?lang=uk" class="lang-pill " th:classappend="${#locale.language == 'uk' or #locale.language == 'ua'} ? 'active' : ''">UA</a>
                <a href="?lang=en" class="lang-pill" th:classappend="${#locale.language == 'en'} ? 'active' : ''">EN</a>
            </div>
            <a th:href="@{/profile}" class="header-profile-btn" title="Особистий кабінет">
                <i class="far fa-user"></i>
            </a>
            <a th:href="@{/cart}" id="nav-cart-btn" class="header-cart-icon-btn" style="text-decoration: none;">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-count-badge"
                      class="cart-badge"
                      th:classappend="${cartItemCount == null or cartItemCount == 0} ? 'hidden' : ''"
                      th:text="${cartItemCount != null ? cartItemCount : 0}">0</span>
            </a>
        </div>
    </header>
    <div style="background: white; border-bottom: 1px solid #E2E8F0; padding: 0.6rem 2rem; display: flex; gap: 1rem; font-weight: 600; font-size: 0.9rem; margin-top: 70px; position: relative; z-index: 9990;">
        <a href="/" style="color: #FF7A59; text-decoration: none; font-weight: 700;">Головна</a>
        <span style="color: #E2E8F0;">|</span>
        <a href="/shop" class="subnav-link-item">Каталог товарів</a>
        <span style="color: #E2E8F0;">|</span>
        <a href="/profile/pet/add" class="subnav-link-item">Підбір раціону (Квіз)</a>
        <span style="color: #E2E8F0;">|</span>
        <a href="/profile" class="subnav-link-item">Мій профіль</a>
    </div>
</div>
