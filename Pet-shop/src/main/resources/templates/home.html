<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="catalog-page-body">

<div th:insert="layouts/header :: header"></div>


<div class="container my-5">
    <div class="row">
        <div class="col-lg-12">
            <div class="hero-block mb-4">
                <video playsinline autoplay muted loop id="heroVideo">
                    <source th:src="@{/videos/promo.mp4}" type="video/mp4">
                    Твій браузер не підтримує відео.
                </video>
                <div class="hero-content">
                    <h1 class="hero-title">COMPANION</h1>
                    <p class="hero-subtitle">Dogs Like Bros</p>
                </div>
            </div>
            <div class="catalog-header">
                <h2 class="catalog-title"><span class="catalog-title-dot">●</span> КАТАЛОГ</h2>
                <a href="/shop/product" class="catalog-all-btn">Все товари</a>
            </div>

            <div class="row g-4">
                <div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${products}">
                    <div class="product-card-new">
                        <a th:href="'/shop/product/'+${ product.id }" class="product-card-link">

                            <div class="product-card-image-wrapper">
                                <div th:if="${product.image != null and product.image != ''}">
                                    <img th:src="'/images/'+${product.image}" alt="Product Image">
                                </div>
                                <div th:unless="${product.image != null and product.image != ''}">
                                    <img src="/images/noimage.png" alt="No Image">
                                </div>
                                <button class="wishlist-btn"><i class="far fa-heart"></i></button>
                            </div>

                            <div class="product-card-info">
                                <h3 class="product-card-title" th:text="${product.name}">Назва товару</h3>
                                <p class="product-card-price" th:text="${product.price} + ' грн'">2 490 р.</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:insert="layouts/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/profile.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('customErrorModal');
        if (modal) {
            const closeBtn = modal.querySelector('.close-btn');
            const okButton = modal.querySelector('#modalOkButton');
            const modalMessage = modal.querySelector('#modalMessage');

            function closeModal() {
                modal.style.display = 'none';
            }

            if(closeBtn) closeBtn.onclick = closeModal;
            if(okButton) okButton.onclick = closeModal;

            window.onclick = function(event) {
                if (event.target == modal) {
                    closeModal();
                }
            }

            function showCustomAlert(message) {
                if(modalMessage) modalMessage.textContent = message;
                modal.style.display = 'block';
            }

            const errorMessage = [[${error_message}]];
            if (errorMessage) {
                showCustomAlert(errorMessage);
            }
        }
    });
</script>
</body>
</html>
