<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="catalog-page-body">
<div th:insert="layouts/header :: header"></div>
<div class="container my-5">
    <div class="row">
        <div class="col-lg-12">
            <div class="hero-block mb-4">
                <video playsinline autoplay muted loop id="heroVideo">
                    <source th:src="@{/videos/promo.mp4}" type="video/mp4">
                </video>
            </div>
            <div class="catalog-header">
                <h2 class="catalog-title"><span class="catalog-title-dot">●</span> РЕКОМЕНДОВАНІ ТОВАРИ</h2>
                <a href="/shop/product" class="catalog-all-btn">Всі товари</a>
            </div>
            <div class="row g-4">
                <div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${products}">
                    <div class="shop-card h-100">
                        <a th:href="'/shop/product/'+${ product.id }" class="shop-card-img-link">
                            <div class="shop-card-image-wrapper">
                                <img th:if="${product.image != null and product.image != ''}"
                                     th:src="'/images/'+${product.image}"
                                     alt="Product Image">
                                <img th:unless="${product.image != null and product.image != ''}"
                                     src="/images/noimage.png"
                                     alt="No Image">
                            </div>
                        </a>
                        <div class="shop-card-body d-flex flex-column">
                            <a th:href="'/shop/product/'+${ product.id }" class="text-decoration-none">
                                <h5 class="shop-card-title text-dark" th:text="${product.name}">Назва товару</h5>
                            </a>
                            <div class="mt-auto">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="shop-card-price text-success" th:text="${product.price} + ' грн'">0 грн</span>
                                </div>
                                <div class="shop-card-actions row g-2">
                                    <div class="col-6">
                                        <a th:href="'/shop/product/'+${ product.id }" class="btn btn-outline-secondary btn-sm w-100">
                                            <i class="far fa-eye"></i>
                                        </a>
                                    </div>
                                    <div class="col-6">
                                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                            <input type="hidden" name="quantity" value="1">
                                            <button type="submit" class="btn btn-primary btn-sm w-100">
                                                <i class="fas fa-cart-plus"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:insert="layouts/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/profile.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('customErrorModal');
        if (modal) {
            const closeBtn = modal.querySelector('.close-btn');
            const okButton = modal.querySelector('#modalOkButton');
            const modalMessage = modal.querySelector('#modalMessage');

            function closeModal() {
                modal.style.display = 'none';
            }

            if(closeBtn) closeBtn.onclick = closeModal;
            if(okButton) okButton.onclick = closeModal;

            window.onclick = function(event) {
                if (event.target == modal) {
                    closeModal();
                }
            }

            function showCustomAlert(message) {
                if(modalMessage) modalMessage.textContent = message;
                modal.style.display = 'block';
            }

            const errorMessage = [[${error_message}]];
            if (errorMessage) {
                showCustomAlert(errorMessage);
            }
        }
    });
</script>
</body>
</html>
