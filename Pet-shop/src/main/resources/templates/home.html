<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" xintegrity="sha512-z3gLpd7yknf1YoNbCzqN7z0t9e/QJ9Xz4vA24tY2l3y3c5/j6t5V/E/wA5R/K1a4uP5P7lT9V5qF3P5B6/5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header"></div>
<div class="container my-5">
    <div class="row">
        <div class="col-lg-4" th:insert="layouts/sidebar :: sidebar"></div>
        <div class="col-lg-8">
            <h1 th:text="#{ greeting }">Ласкаво просимо!</h1>
            <h2 class="mb-4" th:text="#{ Featured }">Рекомендовані товари</h2>
            <div class="row g-3">
                <div class="col-md-4" th:each="product : ${products}">
                    <div class="card">

                        <div class="card__image-container">
                            <a th:href="'/shop/product/'+${ product.id }">
                                <div th:if="${product.image != null and product.image != ''}">
                                    <img th:src="'/images/'+${product.image}" alt="Product Image">
                                </div>
                                <div th:unless="${product.image != null and product.image != ''}">
                                    <img src="/images/noimage.png" alt="No Image">
                                </div>
                            </a>
                        </div>
                        <div class="card__content">
                            <h3 th:text="${product.name}" class="card__title">Назва товару</h3>
                            <p th:text="${product.short_description}" class="card__description"></p>
                            <p th:text="'Ціна: ' + ${product.price} + ' грн'" class="card__description"></p>
                            <div class="card-buttons">
                                <a th:href="'/shop/product/'+${ product.id }" class="btn btn-info">Перегляд</a>
                                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" style="display: inline-block;">
                                    <input type="hidden" name="quantity" value="1">
                                    <button type="submit" class="btn btn-primary">Купити</button>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div> </div>
    </div> </div>
<footer th:insert="layouts/footer :: footer"></footer>
<div id="customErrorModal" class="modal-alert-overlay">
    <div class="modal-alert-content">
        <div class="modal-alert-header">
            <h5 id="modalTitle">Увага! Товар закінчився!</h5>
            <span class="close-btn">&times;</span>
        </div>
        <div class="modal-alert-body">
            <p id="modalMessage">На складі недостатньо товару. Будь ласка, зменште кількість або оберіть інший товар.</p>
        </div>
        <div class="modal-alert-footer">
            <button id="modalOkButton" class="btn-custom-ok">Зрозуміло</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<script src="/js/profile.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('customErrorModal');
        if (modal) {
            const closeBtn = modal.querySelector('.close-btn');
            const okButton = modal.querySelector('#modalOkButton');
            const modalMessage = modal.querySelector('#modalMessage');

            function closeModal() {
                modal.style.display = 'none';
            }

            if(closeBtn) closeBtn.onclick = closeModal;
            if(okButton) okButton.onclick = closeModal;

            window.onclick = function(event) {
                if (event.target == modal) {
                    closeModal();
                }
            }

            function showCustomAlert(message) {
                if(modalMessage) modalMessage.textContent = message;
                modal.style.display = 'block';
            }

            const errorMessage = [[${error_message}]];
            if (errorMessage) {
                showCustomAlert(errorMessage);
            }
        }
    });
</script>
</body>
</html>
