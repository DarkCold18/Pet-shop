<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ title }"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" xintegrity="sha512-z3gLpd7yknf1YoNbCzqN7z0t9e/QJ9Xz4vA24tY2l3y3c5/j6t5V/E/wA5R/K1a4uP5P7lT9V5qF3P5B6/5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="layouts/header :: header">

</div>
<div class="row ">
    <div class="col-8 cen-add">
        <h2 th:text="#{ Contact }"></h2>
        <form th:action="@{contact}" method="post" class="my-form">
            <div class="mb-3">
                <label th:text="#{ Contact_name }">Ваше ім'я</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label th:text="#{ Contact_message }">Повідомлення</label>
                <textarea name="message" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" th:text="#{ Contact_button }"></button>
        </form>

    </div>
    <table class="contact" id="contactTable">
        <thead>
        <tr>
            <th>Контактний телефон</th>
            <th>Адреса</th>
            <th>Час роботи</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>+380931825783</td>
            <td>Вулиця Свободи, 23а, Конотоп, Сумська область</td>
            <td>Пн-пт 08:30-13:00</td>
        </tr>
        </tbody>
    </table>
    <div class="map-container">
    <div class="maps">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2498.7311697194846!2d33.186251976843764!3d51.224027771750286!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x412a49bf22a2903b%3A0x56b2241aa68430d0!2z0LLRg9C70LjRhtGPINCh0LLQvtCx0L7QtNC4LCAyM9CwLCDQmtC-0L3QvtGC0L7Qvywg0KHRg9C80YHRjNC60LAg0L7QsdC70LDRgdGC0YwsIDQxNjE1!5e0!3m2!1suk!2sua!4v1752001691852!5m2!1suk!2sua" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    </div>
    <div class="col-4" th:insert="layouts/sidebar :: sidebar">

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<footer th:insert="layouts/footer :: footer">

</footer>

</body>
</html>
